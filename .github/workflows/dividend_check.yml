name: Dividend Tracker

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-dividends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run dividend check
        run: python dividend_check.py
      - name: Save data to repo
        run: |
          git config user.name "dividend-bot"
          git config user.email "bot@dividend"
          git add docs/data.json dividend_memory.json
          git diff --staged --quiet || git commit -m "update dividend data"
          git push
